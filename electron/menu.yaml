# Ktrl menu structure - edit to customize.
# Each item: action (key for actions.js), name (displayed in center on hover), icon (optional, defaults to action)
# Icons load from assets/icons/{icon}.svg
# Order: top, right, bottom, left (clockwise from 12 o'clock)
root:
  - action: open-app
    name: Open App
    icon: box
    children:
      - action: browser
        name: Browser
        icon: browser
      - action: files
        name: Files
        icon: files
      - action: notes
        name: Notes
        icon: notes
      - action: add-app
        name: Add App
        icon: plus
  - action: presets
    name: Presets
    icon: bookmark
    children:
      - action: study
        name: Study
        icon: study
      - action: gaming
        name: Gaming
        icon: gaming
      - action: personal
        name: Personal
        icon: personal
  - action: settings
    name: Settings
    icon: swap
  - action: close
    name: Close
    icon: exit
    isClose: true
